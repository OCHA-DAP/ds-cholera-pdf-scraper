name: Extract Data from WHO PDF

on:
  workflow_run:
    workflows: ["Download Latest WHO PDF"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      week_number:
        description: 'Week number to extract (leave empty for latest)'
        required: false
        type: string
        default: ''
      year:
        description: 'Year (required if week specified)'
        required: false
        type: string
        default: ''
      model:
        description: 'Model to use'
        required: false
        type: string
        default: 'gpt-5'

jobs:
  extract:
    runs-on: ubuntu-latest
    # Only run if the download workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      week_number: ${{ steps.extract_info.outputs.week_number }}
      year: ${{ steps.extract_info.outputs.year }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          # Install full project dependencies (includes extraction libs)
          uv sync --frozen

      - name: Run extraction
        id: run_extraction
        env:
          DSCI_AZ_OPENAI_API_KEY_WHO_CHOLERA: ${{ secrets.DSCI_AZ_OPENAI_API_KEY_WHO_CHOLERA }}
          DSCI_AZ_BLOB_DEV_SAS: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS_WRITE }}
          DSCI_AZ_BLOB_DEV_SAS_WRITE: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS_WRITE }}
          STAGE: dev
          LOG_BACKEND: duckdb
          PYTHONUNBUFFERED: 1  # Force unbuffered output for real-time logs
        run: |
          # Build arguments
          ARGS=""

          # Week argument
          if [ -n "${{ inputs.week_number }}" ]; then
            ARGS="$ARGS --week ${{ inputs.week_number }}"
          else
            ARGS="$ARGS --week latest"
          fi

          # Year argument (if week specified)
          if [ -n "${{ inputs.year }}" ]; then
            ARGS="$ARGS --year ${{ inputs.year }}"
          fi

          # Model argument
          if [ -n "${{ inputs.model }}" ]; then
            ARGS="$ARGS --model ${{ inputs.model }}"
          fi

          # Run extraction and capture output
          OUTPUT=$(uv run python scripts/run_llm_extraction_gha.py $ARGS 2>&1)
          echo "$OUTPUT"

          # Extract week/year from output
          WEEK=$(echo "$OUTPUT" | grep "EXTRACTION_WEEK=" | cut -d'=' -f2 | tr -d '[:space:]')
          YEAR=$(echo "$OUTPUT" | grep "EXTRACTION_YEAR=" | cut -d'=' -f2 | tr -d '[:space:]')

          # Save to GitHub output
          if [ -n "$WEEK" ] && [ -n "$YEAR" ]; then
            echo "week=$WEEK" >> $GITHUB_OUTPUT
            echo "year=$YEAR" >> $GITHUB_OUTPUT
          fi

      - name: Extract week/year info for post-processing
        id: extract_info
        run: |
          # Use extracted week/year from the actual PDF processed
          if [ -n "${{ steps.run_extraction.outputs.week }}" ] && [ -n "${{ steps.run_extraction.outputs.year }}" ]; then
            echo "week_number=${{ steps.run_extraction.outputs.week }}" >> $GITHUB_OUTPUT
            echo "year=${{ steps.run_extraction.outputs.year }}" >> $GITHUB_OUTPUT
            echo "ℹ️  Using week/year from extracted PDF: Week ${{ steps.run_extraction.outputs.week }}, Year ${{ steps.run_extraction.outputs.year }}"
          elif [ -n "${{ inputs.week_number }}" ] && [ -n "${{ inputs.year }}" ]; then
            # Fallback to inputs if extraction didn't output week/year
            echo "week_number=${{ inputs.week_number }}" >> $GITHUB_OUTPUT
            echo "year=${{ inputs.year }}" >> $GITHUB_OUTPUT
            echo "ℹ️  Using week/year from inputs: Week ${{ inputs.week_number }}, Year ${{ inputs.year }}"
          else
            echo "⚠️  WARNING: Could not determine week/year from extraction output"
            echo "This may cause issues with post-processing and comparisons"
          fi

      - name: Create job summary
        if: success()
        run: |
          WEEK="${{ steps.extract_info.outputs.week_number }}"
          YEAR="${{ steps.extract_info.outputs.year }}"
          WEEK_PAD=$(printf "%02d" "$WEEK")

          echo "## LLM Extraction Successful! ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Week**: ${WEEK}" >> $GITHUB_STEP_SUMMARY
          echo "- **Year**: ${YEAR}" >> $GITHUB_STEP_SUMMARY
          echo "- **Model**: ${{ inputs.model || 'gpt-5' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Read extracted data" >> $GITHUB_STEP_SUMMARY
          echo '```python' >> $GITHUB_STEP_SUMMARY
          echo 'import ocha_stratus as stratus' >> $GITHUB_STEP_SUMMARY
          echo 'import pandas as pd' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "# Check blob for exact filename ({timestamp} varies per run)" >> $GITHUB_STEP_SUMMARY
          echo "df = stratus.load_csv_from_blob(" >> $GITHUB_STEP_SUMMARY
          echo "    blob_name=\"ds-cholera-pdf-scraper/processed/monitoring/llm_extractions/OEW${WEEK_PAD}-${YEAR}_gpt-5_{timestamp}_processed.csv\"," >> $GITHUB_STEP_SUMMARY
          echo '    stage="dev",' >> $GITHUB_STEP_SUMMARY
          echo '    container_name="projects"' >> $GITHUB_STEP_SUMMARY
          echo ')' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Handle failure
        if: failure()
        run: |
          echo "## Extraction Failed ❌" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for error details." >> $GITHUB_STEP_SUMMARY

  post-process:
    needs: extract
    if: success()
    uses: ./.github/workflows/post-process-extractions.yml
    with:
      source: llm
      week_number: ${{ needs.extract.outputs.week_number }}
      year: ${{ needs.extract.outputs.year }}
      correct_gap_fill: false
    secrets:
      DSCI_AZ_BLOB_DEV_SAS_WRITE: ${{ secrets.DSCI_AZ_BLOB_DEV_SAS_WRITE }}
